[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION        = "20"
  SECRETS_SCAN_ENABLED = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache headers for Next.js static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Next.js image optimization redirects (Netlify default)
[[redirects]]
  from = "/_next/image"
  to   = "/.netlify/images"
  status = 200
  force  = true

[[redirects]]
  from = "/_ipx/*"
  to   = "/.netlify/images"
  status = 200
  force  = true
