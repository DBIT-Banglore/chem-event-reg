[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Ignore ONLY public env vars (safe ones)
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_RAZORPAY_KEY_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Optional: cache headers for Next.js static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Next.js image optimization redirects (Netlify default)
[[redirects]]
  from = "/_next/image"
  to = "/.netlify/images"
  status = 200
  force = true

[[redirects]]
  from = "/_ipx/*"
  to = "/.netlify/images"
  status = 200
  force = true
